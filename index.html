<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="A beautiful dark-themed Markdown Editor with live preview, save, and export features.">
    <meta name="keywords" content="markdown, editor, viewer, preview, dark theme">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Highlight.js Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        id="hljs-theme">

    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="print.css" media="print">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M3 5C3 3.89543 3.89543 3 5 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V5Z"
                            stroke="currentColor" stroke-width="2" />
                        <path d="M7 15V9L9.5 12L12 9V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M17 9V15L14.5 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <h1 class="logo-text">Markdown Editor</h1>
                </div>
                <p class="tagline">Create, edit, and preview your Markdown files</p>
            </div>
        </header>

        <!-- Toolbar -->
        <div class="toolbar" id="toolbar">
            <div class="toolbar-left">
                <!-- New File Button -->
                <button class="toolbar-btn" id="newFileBtn" title="新建檔案 (Ctrl+N)">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M12 18V12M9 15H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span>新建</span>
                </button>

                <!-- Open File Button -->
                <button class="toolbar-btn" id="openFileBtn" title="開啟檔案 (Ctrl+O)">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22 19C22 20.1046 21.1046 21 20 21H4C2.89543 21 2 20.1046 2 19V5C2 3.89543 2.89543 3 4 3H9L11 6H20C21.1046 6 22 6.89543 22 8V19Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span>開啟</span>
                </button>

                <!-- Save Button -->
                <button class="toolbar-btn" id="saveBtn" title="存檔 (Ctrl+S)" disabled>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H16L21 8V19C21 20.1046 20.1046 21 19 21Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M17 21V13H7V21" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M7 3V8H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span>存檔</span>
                </button>

                <!-- Export Dropdown -->
                <div class="dropdown" id="exportDropdown">
                    <button class="toolbar-btn" id="exportBtn" title="導出" disabled>
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 15V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V15"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        <span>導出</span>
                        <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </button>
                    <div class="dropdown-menu" id="exportMenu">
                        <button class="dropdown-item" id="exportMdBtn">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z"
                                    stroke="currentColor" stroke-width="2" />
                            </svg>
                            <span>Markdown (.md)</span>
                        </button>
                        <button class="dropdown-item" id="exportHtmlBtn">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M16 18L22 12L16 6M8 6L2 12L8 18" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <span>HTML (.html)</span>
                        </button>
                        <button class="dropdown-item" id="exportPdfBtn">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z"
                                    stroke="currentColor" stroke-width="2" />
                                <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" />
                                <text x="12" y="16" font-size="6" fill="currentColor" text-anchor="middle" font-weight="bold">PDF</text>
                            </svg>
                            <span>PDF (.pdf)</span>
                        </button>
                    </div>
                </div>

                <div class="toolbar-divider"></div>

                <!-- Undo Button -->
                <button class="toolbar-btn" id="undoBtn" title="復原 (Ctrl+Z)" disabled>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 10H16C18.7614 10 21 12.2386 21 15C21 17.7614 18.7614 20 16 20H11"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M7 6L3 10L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>

                <!-- Redo Button -->
                <button class="toolbar-btn" id="redoBtn" title="重做 (Ctrl+Y)" disabled>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 10H8C5.23858 10 3 12.2386 3 15C3 17.7614 5.23858 20 8 20H13"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M17 6L21 10L17 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>

                <div class="toolbar-divider"></div>

                <!-- Search Button -->
                <button class="toolbar-btn" id="searchBtn" title="搜尋與取代 (Ctrl+F)" disabled>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                        <path d="M21 21L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>

                <!-- Print Button -->
                <button class="toolbar-btn" id="printBtn" title="列印 (Ctrl+P)" disabled>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 9V2H18V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M6 18H4C2.89543 18 2 17.1046 2 16V11C2 9.89543 2.89543 9 4 9H20C21.1046 9 22 9.89543 22 11V16C22 17.1046 21.1046 18 20 18H18"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M18 14H6V22H18V14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>

            <div class="toolbar-right">
                <!-- Word Count -->
                <div class="word-count" id="wordCount" hidden>
                    <span id="wordCountText">0 字</span>
                </div>

                <!-- Theme Toggle -->
                <button class="toolbar-btn icon-only" id="themeToggleBtn" title="切換主題">
                    <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" />
                        <path d="M12 1V3M12 21V23M4.22 4.22L5.64 5.64M18.36 18.36L19.78 19.78M1 12H3M21 12H23M4.22 19.78L5.64 18.36M18.36 5.64L19.78 4.22"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>

                <!-- TOC Toggle -->
                <button class="toolbar-btn icon-only" id="tocToggleBtn" title="目錄導航" disabled>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 6H20M4 12H14M4 18H18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>

                <!-- Mode Toggle -->
                <div class="mode-toggle" id="modeToggle">
                    <button class="mode-btn active" id="previewModeBtn" title="預覽模式">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
                        </svg>
                        <span>預覽</span>
                    </button>
                    <button class="mode-btn" id="editModeBtn" title="編輯模式">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M11 4H4C2.89543 4 2 4.89543 2 6V20C2 21.1046 2.89543 22 4 22H18C19.1046 22 20 21.1046 20 20V13"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path
                                d="M18.5 2.5C18.8978 2.10217 19.4374 1.87868 20 1.87868C20.5626 1.87868 21.1022 2.10217 21.5 2.5C21.8978 2.89782 22.1213 3.43739 22.1213 4C22.1213 4.56261 21.8978 5.10217 21.5 5.5L12 15L8 16L9 12L18.5 2.5Z"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span>編輯</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Search & Replace Dialog -->
        <div class="search-dialog" id="searchDialog" hidden>
            <div class="search-dialog-header">
                <span>搜尋與取代</span>
                <button class="search-close-btn" id="searchCloseBtn" title="關閉 (Esc)">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="search-dialog-body">
                <div class="search-row">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜尋...">
                    <span class="search-count" id="searchCount">0/0</span>
                    <button class="search-nav-btn" id="searchPrevBtn" title="上一個 (Shift+Enter)">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                    <button class="search-nav-btn" id="searchNextBtn" title="下一個 (Enter)">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div class="search-row">
                    <input type="text" class="search-input" id="replaceInput" placeholder="取代為...">
                    <button class="search-action-btn" id="replaceBtn">取代</button>
                    <button class="search-action-btn" id="replaceAllBtn">全部取代</button>
                </div>
                <div class="search-options">
                    <label class="search-option">
                        <input type="checkbox" id="searchCaseSensitive">
                        <span>區分大小寫</span>
                    </label>
                    <label class="search-option">
                        <input type="checkbox" id="searchRegex">
                        <span>正則表達式</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- TOC Sidebar -->
        <aside class="toc-sidebar" id="tocSidebar" hidden>
            <div class="toc-header">
                <span>📑 目錄</span>
                <button class="toc-close-btn" id="tocCloseBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <nav class="toc-content" id="tocContent">
                <!-- TOC will be generated here -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Drop Zone -->
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-content">
                    <div class="drop-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 16V8M12 8L9 11M12 8L15 11" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M3 15V17C3 19.2091 4.79086 21 7 21H17C19.2091 21 21 19.2091 21 17V15"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </div>
                    <h2 class="drop-title">Drop your Markdown file here</h2>
                    <p class="drop-subtitle">or click to browse</p>
                    <div class="file-types">
                        <span class="file-badge">.md</span>
                        <span class="file-badge">.markdown</span>
                        <span class="file-badge">.txt</span>
                    </div>
                </div>
                <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/plain,image/*" hidden>
            </div>

            <!-- Split View Editor (hidden by default) -->
            <div class="split-view" id="splitView">
                <!-- Left: Editor Pane -->
                <div class="split-pane editor-pane">
                    <div class="pane-header">
                        <span class="pane-title">📝 編輯</span>
                        <!-- Editor Toolbar -->
                        <div class="editor-toolbar" id="editorToolbar">
                            <button class="editor-toolbar-btn" data-action="bold" title="粗體 (Ctrl+B)">
                                <strong>B</strong>
                            </button>
                            <button class="editor-toolbar-btn" data-action="italic" title="斜體 (Ctrl+I)">
                                <em>I</em>
                            </button>
                            <button class="editor-toolbar-btn" data-action="strikethrough" title="刪除線">
                                <s>S</s>
                            </button>
                            <div class="editor-toolbar-divider"></div>
                            <button class="editor-toolbar-btn" data-action="h1" title="標題 1">H1</button>
                            <button class="editor-toolbar-btn" data-action="h2" title="標題 2">H2</button>
                            <button class="editor-toolbar-btn" data-action="h3" title="標題 3">H3</button>
                            <div class="editor-toolbar-divider"></div>
                            <button class="editor-toolbar-btn" data-action="link" title="連結 (Ctrl+K)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" data-action="image" title="圖片">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <circle cx="8.5" cy="8.5" r="1.5" />
                                    <path d="M21 15l-5-5L5 21" />
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" data-action="code" title="程式碼區塊">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M16 18L22 12L16 6M8 6L2 12L8 18" />
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" data-action="quote" title="引用">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z" />
                                    <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z" />
                                </svg>
                            </button>
                            <div class="editor-toolbar-divider"></div>
                            <button class="editor-toolbar-btn" data-action="ul" title="無序清單">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="8" y1="6" x2="21" y2="6" />
                                    <line x1="8" y1="12" x2="21" y2="12" />
                                    <line x1="8" y1="18" x2="21" y2="18" />
                                    <circle cx="4" cy="6" r="1" fill="currentColor" />
                                    <circle cx="4" cy="12" r="1" fill="currentColor" />
                                    <circle cx="4" cy="18" r="1" fill="currentColor" />
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" data-action="ol" title="有序清單">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="10" y1="6" x2="21" y2="6" />
                                    <line x1="10" y1="12" x2="21" y2="12" />
                                    <line x1="10" y1="18" x2="21" y2="18" />
                                    <text x="4" y="8" font-size="8" fill="currentColor">1</text>
                                    <text x="4" y="14" font-size="8" fill="currentColor">2</text>
                                    <text x="4" y="20" font-size="8" fill="currentColor">3</text>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" data-action="task" title="任務清單">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="5" width="6" height="6" rx="1" />
                                    <path d="M4.5 8l1.5 1.5 3-3" />
                                    <line x1="12" y1="8" x2="21" y2="8" />
                                    <rect x="3" y="14" width="6" height="6" rx="1" />
                                    <line x1="12" y1="17" x2="21" y2="17" />
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" data-action="table" title="表格">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" />
                                    <line x1="3" y1="9" x2="21" y2="9" />
                                    <line x1="3" y1="15" x2="21" y2="15" />
                                    <line x1="9" y1="3" x2="9" y2="21" />
                                    <line x1="15" y1="3" x2="15" y2="21" />
                                </svg>
                            </button>
                            <div class="editor-toolbar-divider"></div>
                            <button class="editor-toolbar-btn" data-action="math" title="數學公式">
                                <span>∑</span>
                            </button>
                            <button class="editor-toolbar-btn" data-action="mermaid" title="Mermaid 圖表">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 3v18M3 12h18M7 7l10 10M17 7L7 17" />
                                </svg>
                            </button>
                            <div class="editor-toolbar-divider"></div>
                            <button class="editor-toolbar-btn convert-md-btn" data-action="convertMd" title="轉成MD (Ctrl+Shift+M)">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 6h16M4 12h16M4 18h10" />
                                    <path d="M19 15l-3 3 3 3" />
                                </svg>
                                <span>MD</span>
                            </button>
                        </div>
                    </div>
                    <textarea class="editor-textarea" id="editorTextarea" placeholder="在此輸入 Markdown 內容..."
                        spellcheck="false"></textarea>
                </div>

                <!-- Resizer -->
                <div class="split-resizer" id="splitResizer"></div>

                <!-- Right: Preview Pane -->
                <div class="split-pane preview-pane">
                    <div class="pane-header">
                        <span class="pane-title">👁️ 預覽</span>
                    </div>
                    <article class="preview-content" id="previewContent">
                        <!-- Live preview will appear here -->
                    </article>
                </div>
            </div>

            <!-- Full Preview Mode (when not in edit mode) -->
            <article class="markdown-content" id="markdownContent">
                <!-- Rendered markdown will appear here -->
            </article>

            <!-- File Info Bar -->
            <div class="file-info-bar" id="fileInfoBar" hidden>
                <div class="file-info-left">
                    <span class="file-name" id="fileName">untitled.md</span>
                    <span class="file-status" id="fileStatus"></span>
                </div>
                <div class="file-info-right">
                    <span class="file-stats" id="fileStats"></span>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Built with <span class="heart">&#9829;</span> using marked.js & highlight.js</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
